name: Release

# Publishes on version tag push. Creating a GitHub release also creates
# the tag, so `gh release create vX.Y.Z` triggers this workflow too.
on:
  push:
    tags: ['v*']

permissions: {}

jobs:
  publish:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      # Required for npm trusted publishing (OIDC) and provenance.
      id-token: write
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      - uses: actions/setup-node@820762786026740c76f36085b0efc47a31fe5020 # v7.0.0
        with:
          node-version: 24
          cache: npm
          registry-url: 'https://registry.npmjs.org'
      - run: npm ci
      - run: npm run lint
      - run: npm run typecheck
      - run: npx vitest run
      # prepublishOnly builds dist/; provenance is attached automatically
      # when publishing via a configured npm trusted publisher.
      - run: npm publish
